<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ERP System{% endblock title %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a href="/" class="navbar-brand">ERP System</a>
      <div class="navbar-nav ms-auto">
        {% if user.is_authenticated %}
          <span class="nav-item nav-link text-white me-3">olá, {{ user.username }} </span>
          <form action="{% url 'logout' %}" method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
          </form>
          {% else %}
          <a href="{% url 'login' %}" class="nav-item nav-link">Login</a>
          <a href="{% url 'signup' %}" class="nav-item nav-link">Cadastrar</a>
        {% endif %}
      </div>
    </div>
  </nav>
</body>
</html>
