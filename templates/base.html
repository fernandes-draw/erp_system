{% load static %}

<!DOCTYPE html>
<html lang="pt-br" id="theme-html" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ERP Fundimar{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="sidebar-collapsed"> <div id="wrapper">
        {% include "includes/navbar.html" %}

        <div id="main-container">
            {% if user.is_authenticated %}
                {% include "includes/sidebar.html" %}
            {% endif %}

            <main id="content-area">
                {% if user.is_authenticated %}
                <button id="toggleSidebar" class="btn btn-sm btn-outline-secondary mb-3">
                    <i class="bi bi-chevron-right" id="toggleIcon"></i>
                </button>
                {% endif %}

                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
