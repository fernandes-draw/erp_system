<aside id="sidebar" class="bg-body-tertiary border-end transition-all shadow-sm">
    <div class="sidebar-user-panel p-3 border-bottom mb-2">
        <div class="d-flex align-items-center position-relative transition-all">
            <div class="flex-shrink-0 position-relative mx-auto">
                <a href="{% url 'profile_edit' %}" class="edit-profile-icon position-absolute bottom-0 end-0 bg-white text-dark rounded-circle border shadow-sm" style="width: 26px; z-index: 2; text-decoration: none;" title="Editar Perfil">
                    <div class="d-flex align-items-center justify-content-center">
                        <i class="bi bi-pencil-fill" style="font-size: 0.8rem;"></i>
                    </div>
                </a>

                {% if user.avatar %}
                    <img src="{{ user.avatar.url }}" class="rounded-circle border shadow-sm img-user-sidebar transition-all" style="width: 45px; height: 45px; object-fit: cover;">
                {% else %}
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center img-user-sidebar transition-all" style="width: 45px; height: 45px;">
                        <i class="bi bi-person-fill fs-2"></i>
                    </div>
                {% endif %}
            </div>
            
            <div class="flex-grow-1 ms-3 sidebar-text transition-all">
                <p class="mb-0 fw-bold lh-base text-truncate">{{ user.username }}</p>
                <div class="mt-1">
                    <span class="badge bg-primary-subtle text-primary border border-primary-subtle">
                        {% if user.is_superuser %}Diretor{% elif user.is_staff %}Gerente{% else %}Operador{% endif %}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div class="nav flex-column nav-pills p-2 h-100">
        <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %} mb-1">
            <i class="bi bi-speedometer2 me-2"></i> <span class="sidebar-text">Dashboard</span>
        </a>
        
        <div class="sidebar-text text-uppercase text-muted small fw-bold mt-3 mb-1 px-3">Gestão</div>
        
        <a href="#" class="nav-link mb-1">
            <i class="bi bi-people me-2"></i> <span class="sidebar-text">Clientes</span>
        </a>
        
        <a href="#" class="nav-link mb-1">
            <i class="bi bi-box-seam me-2"></i> <span class="sidebar-text">Estoque</span>
        </a>

        <div class="mt-auto border-top pt-2">
            {% if user.is_staff %}
            <a href="{% url 'signup' %}" class="nav-link text-primary mb-1">
                <i class="bi bi-person-plus-fill me-2"></i> <span class="sidebar-text">Novo Usuário</span>
            </a>
            {% endif %}
            
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="nav-link text-danger w-100 text-start border-0 bg-transparent">
                    <i class="bi bi-box-arrow-left me-2"></i> <span class="sidebar-text">Sair</span>
                </button>
            </form>
        </div>
    </div>
</aside>
